<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Finance App — Stock Filming Tool</title>
<style>
:root{
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --bg:#F2F3F6; --surface:#FFFFFF; --surface-2:#F6F7F9;
  --text:#0E1116; --muted:#6A7280; --faint:#9AA1AC; --line:#E6E8EC;
  --shadow:0 18px 50px -24px rgba(16,20,30,.30); --shadow-sm:0 6px 20px -12px rgba(16,20,30,.30);
  --ok:#11936B; --ok-soft:#E6F5EE; --bad:#D8453B; --bad-soft:#FBEAE8; --statusink:#0E1116;
  --accent:#3A55E0; --accent-2:#5E78FF; --accent-soft:color-mix(in srgb,var(--accent) 13%,var(--surface));
}
.dark{
  --bg:#0B0D11; --surface:#15191F; --surface-2:#1B2027;
  --text:#F3F5F8; --muted:#9BA3AE; --faint:#6B7480; --line:#262C34;
  --shadow:0 24px 60px -22px rgba(0,0,0,.7); --shadow-sm:0 8px 24px -14px rgba(0,0,0,.6);
  --ok:#2FBE8C; --ok-soft:#11271F; --bad:#F2685D; --bad-soft:#2A1614; --statusink:#F3F5F8;
  --accent-soft:color-mix(in srgb,var(--accent) 22%,var(--surface));
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none;
  -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none; -webkit-user-drag:none; }
html,body{ height:100%; margin:0; }
body{ font-family:var(--font); background:var(--bg); color:var(--text); overflow:hidden; position:fixed; inset:0; transition:background .35s,color .35s; touch-action:manipulation; }

#home,#stage{ position:absolute; inset:0; display:flex; flex-direction:column; background:var(--bg); }
#stage{ cursor:pointer; }
.hidden{ display:none !important; }
.statusbar{ flex:0 0 auto; height:54px; padding:0 26px 8px; display:flex; align-items:flex-end; justify-content:space-between; color:var(--statusink); font-size:15px; font-weight:600; }
.statusbar .sig{ display:flex; align-items:center; gap:7px; } .statusbar .stroke{ fill:var(--statusink); }
.body{ flex:1; display:flex; flex-direction:column; padding:0 24px; }
.center-col{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }

.eyebrow{ font-size:12.5px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); }
.paylabel{ font-size:32px; font-weight:800; letter-spacing:-.02em; line-height:1.1; }
.h1{ font-size:30px; font-weight:800; letter-spacing:-.02em; line-height:1.1; }
.brandmark{ font-size:15px; font-weight:800; letter-spacing:.30em; text-transform:uppercase; }
.amount{ font-weight:800; letter-spacing:-.03em; font-variant-numeric:tabular-nums; }
.muted{ color:var(--muted); } .small{ font-size:13.5px; }
.tap-hint{ animation:hintFade 1.8s ease-in-out infinite; } @keyframes hintFade{ 0%,100%{opacity:.5} 50%{opacity:1} }

/* discs */
.disc{ width:154px; height:154px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:24px; animation:pop .5s cubic-bezier(.2,.9,.3,1.3) both; }
.disc svg{ width:66px; height:66px; }
.disc.accent{ background:var(--accent-soft); color:var(--accent); } .disc.ok{ background:var(--ok-soft); color:var(--ok); } .disc.bad{ background:var(--bad-soft); color:var(--bad); }
.disc.pulse{ animation:pop .5s both, discPulse 1.8s .45s ease-in-out infinite; }
@keyframes discPulse{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
.nfc-wrap{ position:relative; width:200px; height:200px; display:flex; align-items:center; justify-content:center; margin-bottom:6px; }
.ring{ position:absolute; border-radius:50%; border:2px solid var(--accent); width:74px; height:74px; opacity:0; animation:ringPulse 2.6s cubic-bezier(.2,.6,.3,1) infinite; }
.ring:nth-child(2){ animation-delay:.65s; } .ring:nth-child(3){ animation-delay:1.3s; }
@keyframes ringPulse{ 0%{width:74px;height:74px;opacity:0} 12%{opacity:.5} 100%{width:200px;height:200px;opacity:0} }
.nfc-core{ width:104px; height:104px; border-radius:50%; background:var(--accent-soft); color:var(--accent); display:flex; align-items:center; justify-content:center; box-shadow:0 0 0 10px color-mix(in srgb,var(--accent) 8%,transparent); }
.nfc-core svg{ width:46px; height:46px; }
.spinner{ width:120px; height:120px; border-radius:50%; border:6px solid var(--line); border-top-color:var(--accent); animation:spin 1s linear infinite; margin-bottom:24px; }
@keyframes spin{ to{ transform:rotate(360deg); } }
.suc{ position:relative; width:160px; height:160px; display:flex; align-items:center; justify-content:center; margin-bottom:24px; }
.suc .ripple{ position:absolute; inset:0; border-radius:50%; border:3px solid var(--ok); opacity:0; }
.suc .circle{ position:absolute; inset:0; border-radius:50%; background:var(--ok-soft); }
.suc svg{ position:relative; z-index:2; width:84px; height:84px; }
.suc .tick{ fill:none; stroke:var(--ok); stroke-width:3.1; stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:80; stroke-dashoffset:80; }
.s-draw .circle{ background:var(--ok-soft); box-shadow:inset 0 0 0 5px var(--ok); animation:pop .45s cubic-bezier(.2,.9,.3,1.3) both; } .s-draw .tick{ animation:draw .55s .22s ease forwards; } .s-draw .ripple{ animation:ripple .85s .15s ease-out; }
.s-burst .circle{ background:var(--ok); animation:pop .4s cubic-bezier(.2,.9,.3,1.3) both; } .s-burst .tick{ stroke:#fff; animation:draw .5s .2s ease forwards; } .s-burst .ripple{ animation:ripple .8s .1s ease-out; }
.s-stamp .circle{ background:var(--ok-soft); box-shadow:inset 0 0 0 5px var(--ok); } .s-stamp svg{ animation:stamp .5s cubic-bezier(.2,1.35,.4,1) both; } .s-stamp .tick{ stroke-dashoffset:0; } .s-stamp .ripple{ animation:ripple .7s .12s ease-out; }
.s-glow .circle{ background:var(--ok); animation:pop .4s both, glow 1.7s .35s ease-in-out infinite; } .s-glow .tick{ stroke:#fff; animation:draw .5s .2s ease forwards; }
@keyframes pop{ 0%{transform:scale(.4);opacity:0} 100%{transform:scale(1);opacity:1} }
@keyframes draw{ to{ stroke-dashoffset:0; } }
@keyframes ripple{ 0%{transform:scale(.55);opacity:.6} 100%{transform:scale(1.7);opacity:0} }
@keyframes stamp{ 0%{transform:scale(2.5) rotate(-14deg);opacity:0} 60%{opacity:1} 100%{transform:scale(1) rotate(0);opacity:1} }
@keyframes glow{ 0%,100%{box-shadow:0 0 0 0 color-mix(in srgb,var(--ok) 45%,transparent)} 70%{box-shadow:0 0 0 28px color-mix(in srgb,var(--ok) 0%,transparent)} }
.draw{ stroke-dasharray:80; stroke-dashoffset:80; animation:draw .55s .18s ease forwards; }
.retrybtn{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%; min-height:54px; border:none; cursor:pointer; border-radius:16px; font-family:var(--font); font-size:16px; font-weight:700; background:var(--accent); color:#fff; box-shadow:var(--shadow-sm); }
.retrybtn:active{ transform:translateY(1px); } .retrybtn svg{ width:20px; height:20px; }

/* assistant orb / waves / mic */

/* home */
.home-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:13px; padding-bottom:84px; }
.sector{ background:var(--surface); border:1px solid var(--line); border-radius:22px; padding:18px 8px 16px; text-align:center; cursor:pointer; position:relative; transition:transform .12s; }
.sector:active{ transform:scale(.96); }
.sector .sicon{ width:50px; height:50px; border-radius:15px; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; color:#fff; }
.sector .sicon svg{ width:24px; height:24px; }
.sector .sname{ font-size:12.5px; font-weight:650; }
.sector.soon{ opacity:.46; cursor:default; }
.soonpill{ position:absolute; top:8px; right:8px; font-size:9px; font-weight:800; letter-spacing:.06em; background:var(--surface-2); color:var(--muted); padding:2px 6px; border-radius:6px; border:1px solid var(--line); }

/* handle + panel */
#handle{ position:fixed; left:50%; bottom:0; transform:translateX(-50%); width:180px; height:54px; z-index:40; cursor:pointer; background:transparent; border:none; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding-top:7px; }
#handle .bar{ width:56px; height:6px; border-radius:999px; background:var(--faint); opacity:.65; transition:opacity .2s,transform .2s; }
#handle .chev{ margin-top:4px; color:var(--faint); opacity:.6; transition:opacity .2s,transform .2s; } #handle .chev svg{ width:18px; height:18px; display:block; }
#handle:active .bar,#handle:active .chev{ opacity:1; } #handle:active .bar{ transform:scaleX(1.18); } #handle:active .chev{ transform:translateY(-2px); }
#backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.45); opacity:0; visibility:hidden; transition:opacity .3s,visibility .3s; z-index:60; }
#backdrop.open{ opacity:1; visibility:visible; }
#panel{ position:fixed; left:0; right:0; bottom:0; max-height:88vh; background:var(--surface); border-radius:24px 24px 0 0; box-shadow:0 -22px 60px -20px rgba(0,0,0,.55); border-top:1px solid var(--line); transform:translateY(101%); transition:transform .34s cubic-bezier(.2,.7,.25,1); z-index:61; display:flex; flex-direction:column; }
#panel.open{ transform:translateY(0); }
.panel-head{ display:flex; align-items:center; justify-content:space-between; padding:16px 20px 12px; border-bottom:1px solid var(--line); position:relative; }
.panel-head .grip{ position:absolute; left:50%; top:7px; transform:translateX(-50%); width:42px; height:5px; border-radius:999px; background:var(--line); }
.panel-head .t{ font-size:17px; font-weight:750; } .panel-head .t span:last-child{ color:var(--muted); font-weight:500; font-size:13px; margin-left:8px; }
.panel-head .x{ width:38px; height:38px; border-radius:50%; border:1px solid var(--line); background:var(--surface-2); color:var(--text); font-size:19px; cursor:pointer; }
.panel-body{ overflow-y:auto; padding:18px 20px 26px; }
.sec{ margin-bottom:20px; } .sec:last-child{ margin-bottom:0; }
.sec .lbl{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:10px; }
.chips{ display:flex; gap:8px; flex-wrap:wrap; }
.chip{ display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:10px 15px; border-radius:13px; background:var(--surface-2); color:var(--text); font-size:14px; font-weight:600; border:1.5px solid var(--line); cursor:pointer; }
.chip.on{ background:var(--accent); color:#fff; border-color:transparent; } .chip.bad.on{ background:var(--bad); } .chip.warnstate.on{ background:#C98A12; }
.amtline{ display:flex; align-items:baseline; justify-content:center; gap:8px; margin:6px 0 10px; } .amtline .amount{ font-size:36px; }
.keypad{ display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
.keypad button{ height:54px; border:none; background:var(--surface-2); color:var(--text); font-size:22px; font-weight:600; font-family:var(--font); border-radius:13px; cursor:pointer; } .keypad button:active{ background:var(--line); }
.optrow{ display:flex; align-items:center; justify-content:space-between; padding:13px 0; border-bottom:1px solid var(--line); } .optrow:last-child{ border-bottom:none; }
.optrow .on-name{ font-size:15px; font-weight:600; }
.switch{ width:52px; height:31px; border-radius:999px; background:var(--line); position:relative; cursor:pointer; flex:0 0 auto; transition:background .2s; } .switch.on{ background:var(--accent); }
.switch::after{ content:""; position:absolute; top:3px; left:3px; width:25px; height:25px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.3); transition:left .2s; } .switch.on::after{ left:24px; }
.minibtn{ padding:9px 16px; border-radius:11px; border:1.5px solid var(--line); background:var(--surface-2); color:var(--text); font-weight:650; font-size:14px; cursor:pointer; font-family:var(--font); }
.resetbtn{ width:100%; padding:14px; border-radius:14px; border:none; background:var(--accent); color:#fff; font-weight:700; font-size:16px; cursor:pointer; font-family:var(--font); margin-top:6px; }
.navbtn{ width:100%; display:flex; align-items:center; gap:10px; padding:14px 16px; border-radius:14px; border:1px solid var(--line); background:var(--surface-2); color:var(--text); font-weight:700; font-size:15px; cursor:pointer; font-family:var(--font); margin-bottom:18px; } .navbtn svg{ width:20px; height:20px; }
.acct-card{ width:86%; max-width:340px; border-radius:22px; padding:22px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); box-shadow:var(--shadow-sm); text-align:left; }
.progress{ width:84%; max-width:320px; height:14px; border-radius:8px; background:var(--line); overflow:hidden; }
.pfill{ display:block; height:100%; border-radius:8px; background:linear-gradient(90deg,var(--accent),var(--accent-2)); width:0; transition:width 1.5s cubic-bezier(.2,.7,.2,1); }
.bgrow-wrap{ display:flex; align-items:flex-end; gap:10px; height:150px; }
.bgrow{ flex:1; background:var(--accent); border-radius:6px 6px 2px 2px; height:0; transition:height .9s ease; }
.trend{ font-weight:700; font-size:15px; } .up{ color:var(--ok); }
.facebox{ width:150px; height:150px; border-radius:28px; background:var(--accent-soft); color:var(--accent); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; margin-bottom:24px; }
.facebox>svg{ width:84px; height:84px; }
.scanline{ position:absolute; left:10px; right:10px; height:3px; background:var(--accent); box-shadow:0 0 12px var(--accent); top:12%; animation:scanY 1.7s ease-in-out infinite; }
@keyframes scanY{ 0%{top:12%} 50%{top:88%} 100%{top:12%} }
.bankcard{ width:280px; max-width:82%; aspect-ratio:1.6/1; border-radius:18px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); position:relative; box-shadow:var(--shadow-sm); margin-bottom:8px; }
.cardchip{ position:absolute; left:22px; top:22px; width:40px; height:30px; border-radius:7px; background:rgba(255,255,255,.55); }
.carddigits{ position:absolute; left:22px; bottom:20px; color:#fff; letter-spacing:.18em; font-weight:600; font-size:16px; }
.frost{ position:absolute; inset:0; border-radius:18px; background:rgba(228,238,247,.82); display:flex; align-items:center; justify-content:center; color:#4a78ad; opacity:0; transition:opacity 1.1s; } .frost svg{ width:54px; height:54px; } .frost.on{ opacity:1; }
.alertrow{ width:86%; max-width:340px; border:1px solid var(--line); background:var(--surface); border-radius:16px; padding:16px; display:flex; align-items:center; justify-content:space-between; margin-top:18px; }
.notifybanner{ width:88%; max-width:360px; display:flex; align-items:center; gap:14px; padding:16px 18px; border-radius:18px; background:var(--surface); border:1px solid var(--line); box-shadow:var(--shadow-sm); transform:translateY(-30px) scale(.96); opacity:0; transition:transform .55s cubic-bezier(.2,.9,.3,1.1),opacity .55s; }
.notifybanner.in{ transform:none; opacity:1; }
.notifybanner .disc{ width:48px; height:48px; flex:0 0 48px; }
.rcv-arrow{ font-size:30px; color:var(--ok); line-height:1; margin-bottom:6px; animation:rcvBob 1.1s ease-in-out infinite; }
@keyframes rcvBob{ 0%,100%{ transform:translateY(-3px) } 50%{ transform:translateY(4px) } }
.scanbox{ width:178px; height:178px; border-radius:32px; background:var(--accent-soft); color:var(--accent); position:relative; display:flex; align-items:center; justify-content:center; overflow:hidden; margin-bottom:22px; }
.scanbox>svg{ width:86px; height:86px; position:relative; z-index:2; }
.scanbox .br{ position:absolute; width:26px; height:26px; border:3px solid var(--accent); z-index:3; }
.scanbox .br.tl{ top:14px; left:14px; border-right:0; border-bottom:0; border-radius:8px 0 0 0; }
.scanbox .br.tr{ top:14px; right:14px; border-left:0; border-bottom:0; border-radius:0 8px 0 0; }
.scanbox .br.bl{ bottom:14px; left:14px; border-right:0; border-top:0; border-radius:0 0 0 8px; }
.scanbox .br.brr{ bottom:14px; right:14px; border-left:0; border-top:0; border-radius:0 0 8px 0; }
.scanring{ position:absolute; inset:0; border-radius:32px; border:2px solid var(--accent); opacity:0; animation:scanRing 2.2s ease-out infinite; z-index:1; }
@keyframes scanRing{ 0%{ transform:scale(.55); opacity:.55 } 100%{ transform:scale(1); opacity:0 } }
.scanpct{ position:absolute; bottom:12px; left:0; right:0; text-align:center; font-size:14px; font-weight:800; color:var(--accent); z-index:4; letter-spacing:.04em; }
.radarbox{ width:178px; height:178px; border-radius:50%; position:relative; overflow:hidden; margin-bottom:22px; background:var(--accent-soft); }
.radarbox::before,.radarbox::after{ content:""; position:absolute; border-radius:50%; border:1.5px solid color-mix(in srgb,var(--accent) 40%,transparent); }
.radarbox::before{ inset:30px; } .radarbox::after{ inset:60px; }
.radarsweep{ position:absolute; inset:0; border-radius:50%; background:conic-gradient(from 0deg, transparent 0deg, color-mix(in srgb,var(--accent) 55%,transparent) 50deg, transparent 70deg); animation:spin 1.7s linear infinite; }
.radardot{ position:absolute; width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); }
.mfa{ display:flex; gap:14px; margin-bottom:24px; }
.mfabox{ width:46px; height:58px; border-radius:13px; border:2px solid var(--line); background:var(--surface-2); position:relative; transition:border-color .3s,transform .3s; }
.mfabox.on{ border-color:var(--accent); transform:translateY(-3px); }
.mfabox.on::after{ content:""; position:absolute; inset:0; margin:auto; width:13px; height:13px; border-radius:50%; background:var(--accent); }
.idcard{ width:266px; max-width:82%; aspect-ratio:1.6/1; border-radius:16px; background:var(--surface); border:1px solid var(--line); box-shadow:var(--shadow-sm); position:relative; display:flex; align-items:center; gap:16px; padding:18px; margin-bottom:22px; }
.idphoto{ width:62px; height:78px; border-radius:10px; background:var(--accent-soft); flex:0 0 62px; }
.idlines{ display:flex; flex-direction:column; gap:9px; }
.idlines i{ display:block; height:9px; border-radius:5px; background:var(--line); }
.idlines i:nth-child(1){ width:118px } .idlines i:nth-child(2){ width:96px } .idlines i:nth-child(3){ width:74px }
.idstamp{ position:absolute; right:16px; bottom:14px; width:50px; height:50px; border-radius:50%; background:var(--ok-soft); color:var(--ok); display:flex; align-items:center; justify-content:center; opacity:0; transform:scale(.3) rotate(-14deg); transition:opacity .5s,transform .5s cubic-bezier(.2,1.4,.4,1); }
.idstamp svg{ width:30px; height:30px; } .idstamp.on{ opacity:1; transform:none; }
.dnmain{ transition:stroke-dashoffset 1.4s cubic-bezier(.2,.7,.2,1); }
.cardov{ position:absolute; inset:0; border-radius:18px; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 1.1s; } .cardov svg{ width:54px; height:54px; } .cardov.on{ opacity:1; }
@media (prefers-reduced-motion: reduce){ *{ animation-duration:.001s !important; animation-iteration-count:1 !important; } }
</style>

<body>
<div id="home"></div>
<div id="stage" class="hidden"></div>

<div id="handle" title="Open controls"><span class="bar"></span><span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15l6-6 6 6"/></svg></span></div>
<div id="backdrop"></div>
<div id="panel">
  <div class="panel-head"><span class="grip"></span>
    <div class="t"><span data-en="Director controls" data-tr="Yönetmen paneli">Director controls</span><span data-en="backstage" data-tr="kulis">backstage</span></div>
    <button class="x" id="closeBtn">×</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script>
(function(){

var reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;

var state={ cur:'USD', raw:'3690', succ:'draw', scene:'idle', result:'approved', merchant:'store', loop:false,
            fmod:'bank', bscenario:'payment_recv', bcur:'USD', bsize:'medium', bcustom:{bank:'125000',recv:'125000',sec:'125000',card:'125000',fin:'125000'}, bsucc:'burst', bstyle:'corporate' };
var RESULTS={approved:1,declined:1,retry:1,insufficient:1,error:1,receipt:1};

var IC={ nfc:'<path d="M5 8c3.5 2 3.5 6 0 8"/><path d="M9 6c5 3 5 9 0 12"/><path d="M13 4c6.5 4 6.5 12 0 16"/>',
  card:'<rect x="3" y="6" width="18" height="13" rx="2.5"/><path d="M3 10h18"/>',
  trend:'<path d="M3 17l6-6 4 4 8-8"/><path d="M21 7v6h-6"/>', plane:'<path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/>',

function goPay(){ mode='pay'; home.classList.add('hidden'); stage.classList.remove('hidden'); document.body.classList.remove('dark'); buildPanelPay(); closePanel(); render('idle'); }
function goFin(id){ mode='bank'; state.fmod=id; state.bscenario=FINMODS[id]||'balance'; home.classList.add('hidden'); stage.classList.remove('hidden'); buildPanelBank(id); applyBankStyle(); closePanel(); bRender('bidle'); }
function goHome(){ mode='home'; stopAnims(); stage.classList.add('hidden'); home.classList.remove('hidden'); document.body.classList.remove('dark'); closePanel(); }

/* init */
buildHome(); buildPanelPay(); render('idle');
})();
</script>
</body>
</html>
